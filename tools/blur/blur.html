<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flouter une image (TBXM)</title>
  <link rel="icon" href="../../.assets/logo/fav.png" />
  <link rel="stylesheet" href="../../style.css">
</head>

<body>
  <a href="/" class="back-link">← Retour</a>
  <h1>Flouter une Image</h1>

  <div class="blur-tool-layout">
    <div class="blur-sidebar">
      <div class="sidebar-section">
        <h3>1. Importer</h3>
        <label class="custom-file-upload">
          <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp" />
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <span>Choisir une image</span>
        </label>
      </div>

      <div class="sidebar-section">
        <h3>2. Mode de flou</h3>
        <div class="custom-radio-group mode-selector">
          <label class="radio-card">
            <input type="radio" name="blurMode" value="brush" checked>
            <div class="radio-content">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"></path>
                <path
                  d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z">
                </path>
              </svg>
              Pinceau
            </div>
          </label>
          <label class="radio-card">
            <input type="radio" name="blurMode" value="full">
            <div class="radio-content">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                <circle cx="9" cy="9" r="2"></circle>
                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
              </svg>
              Global
            </div>
          </label>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>3. Réglages</h3>
        <div class="slider-group" id="brush-size-container">
          <div class="slider-header">
            <span>Taille du pinceau</span>
            <span class="val-badge"><span id="size-val">30</span>px</span>
          </div>
          <input type="range" id="brush-size" min="5" max="100" value="30">
        </div>

        <div class="slider-group">
          <div class="slider-header">
            <span>Intensité du flou</span>
            <span class="val-badge"><span id="blur-val">10</span>px</span>
          </div>
          <input type="range" id="blur-intensity" min="1" max="50" value="10">
        </div>
      </div>

      <div class="sidebar-section" style="margin-top: auto;">
        <button class="btn btn-primary w-full" id="download-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Télécharger l'image
        </button>
      </div>
    </div>

    <div class="blur-main">
      <div class="canvas-container">
        <div class="canvas-placeholder" id="canvas-placeholder">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
            <circle cx="9" cy="9" r="2"></circle>
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
          </svg>
          <p>Importez une image pour commencer</p>
        </div>
        <canvas id="blurry-canvas" style="display: none;"></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="./blur.js"></script>
</body>

</html>
