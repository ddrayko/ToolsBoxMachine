<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blur an Image (TBXM)</title>
    <link rel="icon" href="../../.assets/logo/fav.png" />
    <link rel="stylesheet" href="../../style.css" />
    <style>
      .blur-sidebar {
        gap: 1rem !important;
      }

      .sidebar-section h3 {
        margin-bottom: 0.75rem !important;
      }

      #copy-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .copy-icon-original {
        display: inline-flex;
        align-items: center;
      }

      .copy-icon-wrapper {
        position: relative;
        width: 20px;
        height: 20px;
      }

      /* Icône fade-out */
      .copy-icon-original.fade {
        animation: fadeInOut 2s ease-in-out;
      }

      @keyframes fadeInOut {
        0% {
          opacity: 1;
        }
        25% {
          opacity: 0;
        }
        75% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      .copy-icon-check {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      /* Animation du checkmark */
      .checkmark polyline {
        /* stroke: #10b981; */
        stroke-dasharray: 30;
        stroke-dashoffset: -30;
        animation: drawCheck 0.8s ease-in-out forwards;
      }

      @keyframes drawCheck {
        to {
          stroke-dashoffset: 0;
        }
      }
    </style>
  </head>

  <body>
    <load src="../../ui/navbar.html" />
    <h1>Blur an Image</h1>

    <div class="blur-tool-layout">
      <div class="blur-sidebar">
        <div class="sidebar-section">
          <h3>1. Import Mode</h3>
          <div class="custom-radio-group mode-selector">
            <label class="radio-card">
              <input type="radio" name="importMode" value="file" checked />
              <div class="radio-content">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                File
              </div>
            </label>
            <label class="radio-card">
              <input type="radio" name="importMode" value="clipboard" />
              <div class="radio-content">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect>
                  <path
                    d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                  ></path>
                </svg>
                Clipboard
              </div>
            </label>
          </div>
        </div>

        <div class="sidebar-section" id="file-import-container">
          <h3>2. Choose File</h3>
          <label class="custom-file-upload">
            <input
              type="file"
              id="image-upload"
              accept="image/png, image/jpeg, image/webp"
            />
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span>Choose an image</span>
          </label>
        </div>

        <div
          class="sidebar-section"
          id="clipboard-import-container"
          style="display: none"
        >
          <h3>2. Paste Image</h3>
          <div class="custom-file-upload" id="paste-area" tabindex="0">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect>
              <path
                d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
              ></path>
            </svg>
            <span>Click to Paste</span>
            <p style="font-size: 0.75rem; color: #64748b; margin-top: -0.5rem">
              Or press Ctrl + V
            </p>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>3. Blur Mode</h3>
          <div class="custom-radio-group mode-selector">
            <label class="radio-card">
              <input type="radio" name="blurMode" value="brush" checked />
              <div class="radio-content">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"
                  ></path>
                  <path
                    d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"
                  ></path>
                </svg>
                Brush
              </div>
            </label>
            <label class="radio-card">
              <input type="radio" name="blurMode" value="eraser" />
              <div class="radio-content">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="m20 20-9.5-9.5L14 7l6 6L20 20Z" />
                  <path
                    d="m7 21 5-5-4-4-5 5a2.1 2.1 0 0 0 0 3l1 1c1 .9 2.1.9 3 0Z"
                  />
                </svg>
                Eraser
              </div>
            </label>
            <label class="radio-card">
              <input type="radio" name="blurMode" value="full" />
              <div class="radio-content">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                  <circle cx="9" cy="9" r="2"></circle>
                  <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
                </svg>
                Global
              </div>
            </label>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>4. History</h3>
          <div style="display: flex; gap: 0.75rem">
            <button
              class="btn w-full"
              id="undo-btn"
              style="background: #334155; padding: 0.5rem"
            >
              Undo
            </button>
            <button
              class="btn w-full"
              id="reset-btn"
              style="background: #334155; padding: 0.5rem"
            >
              Reset
            </button>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>5. Settings</h3>
          <div class="slider-group" id="brush-size-container">
            <div class="slider-header">
              <span>Brush Size</span>
              <span class="val-badge"><span id="size-val">30</span>px</span>
            </div>
            <input type="range" id="brush-size" min="5" max="100" value="30" />
          </div>

          <div class="slider-group">
            <div class="slider-header">
              <span>Blur Intensity</span>
              <span class="val-badge"><span id="blur-val">10</span>px</span>
            </div>
            <input
              type="range"
              id="blur-intensity"
              min="1"
              max="50"
              value="10"
            />
          </div>
        </div>

        <div class="sidebar-section" style="margin-top: auto">
          <button class="btn btn-primary w-full" id="copy-btn">
            <span class="copy-icon-wrapper">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                <path
                  d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                ></path>
              </svg>
            </span>
            <span>Copy Image</span>
          </button>

          <button
            class="btn btn-primary w-full"
            id="download-btn"
            style="margin-top: 1rem"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download Image
          </button>
        </div>
      </div>

      <div class="blur-main">
        <div class="canvas-container">
          <div class="canvas-placeholder" id="canvas-placeholder">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
              <circle cx="9" cy="9" r="2"></circle>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
            </svg>
            <p>Import an image to start</p>
          </div>
          <canvas id="blurry-canvas" style="display: none"></canvas>
        </div>
      </div>
    </div>

    <script type="module" src="./blur.js"></script>

    <script type="module" src="/ui/navbar.js"></script>
    <load src="../../ui/footer.html" />
  </body>
</html>
