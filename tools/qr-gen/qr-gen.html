<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator (TBXM)</title>

    <link rel="icon" href="../../.assets/logo/fav.png" />
    <link rel="stylesheet" href="../../style.css" />

    <style>
      .qr-preview-container {
        background: white;
        padding: 2rem;
        border-radius: 1.5rem;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 300px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
      }

      #qrcode {
        max-width: 100%;
      }

      .qr-preview-container.empty {
        background: rgba(255, 255, 255, 0.05);
        color: #64748b;
        border: 2px dashed rgba(255, 255, 255, 0.1);
      }

      div#btn {
        margin-top: 1.5rem;
      }

      .download-btn,
      #copy-btn {
        margin: 1rem auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .color-picker-group {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .color-input-wrapper {
        flex: 1;
      }

      .color-input-wrapper label {
        display: block;
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 0.5rem;
      }

      .color-input-wrapper input {
        width: 100%;
        height: 40px;
        padding: 0;
        border: 1px solid var(--card-border);
        background: transparent;
        border-radius: 0.5rem;
        cursor: pointer;
      }

      select {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.3rem;
        border-radius: 0.5rem;
        border: 1px solid var(--card-border);
        background: #fff;
        color: #000;
      }

      input[type="file"] {
        margin-top: 0.5rem;
        width: 100%;
      }

      .copy-icon-wrapper {
        position: relative;
        width: 20px;
        height: 20px;
      }

      .copy-icon-original.fade {
        animation: fadeInOut 2s ease-in-out;
      }

      @keyframes fadeInOut {
        0% {
          opacity: 1;
        }
        25% {
          opacity: 0;
        }
        75% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      .copy-icon-check {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .checkmark polyline {
        stroke-dasharray: 30;
        stroke-dashoffset: -30;
        animation: drawCheck 0.8s ease-in-out forwards;
      }

      @keyframes drawCheck {
        to {
          stroke-dashoffset: 0;
        }
      }

      /* --- Inputs & selects sombres --- */

      .blur-sidebar select,
      .blur-sidebar input[type="color"],
      .blur-sidebar input[type="file"],
      .blur-sidebar input[type="range"],
      .blur-sidebar input[type="text"] {
        background: rgba(20, 20, 20, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #e2e8f0;
        border-radius: 0.5rem;
        padding: 0.5rem;
        width: 100%;
      }

      /* Texte des labels */
      .blur-sidebar label {
        color: #cbd5e1;
        font-size: 0.85rem;
      }

      /* Select dropdown */
      .blur-sidebar select {
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, #64748b 50%),
          linear-gradient(135deg, #64748b 50%, transparent 50%);
        background-position:
          calc(100% - 15px) calc(50% - 3px),
          calc(100% - 10px) calc(50% + 3px);
        background-size:
          5px 5px,
          5px 5px;
        background-repeat: no-repeat;
        cursor: pointer;
      }

      /* Input file */
      .blur-sidebar input[type="file"] {
        padding: 0.4rem;
        cursor: pointer;
      }

      /* Color pickers */
      .blur-sidebar input[type="color"] {
        padding: 0;
        height: 40px;
        border-radius: 0.5rem;
        background: #111;
      }

      /* Range slider */
      .blur-sidebar input[type="range"] {
        background: transparent;
      }

      .blur-sidebar input[type="range"]::-webkit-slider-thumb {
        background: #6366f1;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .blur-sidebar input[type="range"]::-webkit-slider-runnable-track {
        background: rgba(255, 255, 255, 0.15);
        height: 4px;
        border-radius: 2px;
      }

      /* Placeholder du QR */
      #qr-placeholder {
        color: #94a3b8;
      }

      /* Boutons */
      #copy-btn {
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #e2e8f0;
      }

      #copy-btn:hover {
        background: #334155;
      }
    </style>
  </head>

  <body>
    <load src="../../ui/navbar.html" />

    <h1>QR Code Generator</h1>

    <div class="blur-tool-layout">
      <div class="blur-sidebar">
        <div class="sidebar-section">
          <h3>1. Content</h3>
          <div class="search-input-wrapper" style="margin: 0; max-width: none">
            <input
              type="text"
              id="qr-text"
              placeholder="Enter URL or text..."
              autocomplete="off"
              style="padding-left: 1rem"
            />
          </div>
        </div>

        <div class="sidebar-section">
          <h3>2. Appearance</h3>

          <div class="color-picker-group">
            <div class="color-input-wrapper">
              <label>Foreground</label>
              <input type="color" id="qr-color-dark" value="#000000" />
            </div>
            <div class="color-input-wrapper">
              <label>Background</label>
              <input type="color" id="qr-color-light" value="#ffffff" />
            </div>
          </div>

          <label>Size</label>
          <input
            type="range"
            id="qr-size"
            min="128"
            max="512"
            step="32"
            value="256"
          />
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 0.75rem;
              color: #64748b;
              margin-top: 0.5rem;
            "
          >
            <span>Small</span>
            <span id="size-value">256px</span>
            <span>Large</span>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>3. Style</h3>

          <label>Dot Style</label>
          <select id="qr-dot-style">
            <option value="square">Square</option>
            <option value="dots">Dots</option>
            <option value="rounded">Rounded</option>
            <option value="classy">Classy</option>
            <option value="classy-rounded">Classy Rounded</option>
            <option value="extra-rounded">Extra Rounded</option>
          </select>

          <label style="margin-top: 1rem">Marker border</label>
          <select id="qr-border-style">
            <option value="dot">Dot</option>
            <option value="square" selected>Square</option>
            <option value="rounded">Rounded</option>
            <option value="dots">Dots</option>
            <option value="classy">Classy</option>
            <option value="classy-rounded">Classy Rounded</option>
            <option value="extra-rounded">Extra Rounded</option>
          </select>

          <label style="margin-top: 1rem">Marker Center</label>
          <select id="qr-eye-style">
            <option value="dot">Dot</option>
            <option value="square" selected>Square</option>
            <option value="rounded">Rounded</option>
            <option value="dots">Dots</option>
            <option value="classy">Classy</option>
            <option value="classy-rounded">Classy Rounded</option>
            <option value="extra-rounded">Extra Rounded</option>
          </select>

          <label style="margin-top: 1rem">Logo</label>
          <input type="file" id="qr-logo" accept="image/*" />
        </div>

        <div id="btn">
          <button class="btn btn-primary" id="copy-btn">
            <span class="copy-icon-wrapper">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                <path
                  d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                ></path>
              </svg>
            </span>
            <span>Copy Image</span>
          </button>

          <button
            id="download-qr"
            class="btn btn-primary download-btn"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download PNG
          </button>
        </div>
      </div>

      <div class="blur-main">
        <div id="qr-container" class="qr-preview-container empty">
          <div id="qrcode"></div>
          <div id="qr-placeholder">Your QR code will appear here</div>
        </div>
      </div>
    </div>

    <load src="../../ui/footer.html" />

    <!-- QR Code Styling Library -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>

    <!-- Your Script -->
    <script type="module" src="./qr-gen.js"></script>
    <script type="module" src="/ui/navbar.js"></script>
  </body>
</html>
