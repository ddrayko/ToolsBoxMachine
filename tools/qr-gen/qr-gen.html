<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator (TBXM)</title>
    <link rel="icon" href="../../.assets/logo/fav.png" />
    <link rel="stylesheet" href="../../style.css" />
    <style>
      .qr-preview-container {
        background: white;
        padding: 2rem;
        border-radius: 1.5rem;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 300px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
      }

      #qrcode {
        max-width: 100%;
      }

      .qr-preview-container.empty {
        background: rgba(255, 255, 255, 0.05);
        color: #64748b;
        border: 2px dashed rgba(255, 255, 255, 0.1);
      }

      .download-btn {
        width: 100%;
        margin-top: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .color-picker-group {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .color-input-wrapper {
        flex: 1;
      }

      .color-input-wrapper label {
        display: block;
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 0.5rem;
      }

      .color-input-wrapper input {
        width: 100%;
        height: 40px;
        padding: 0;
        border: 1px solid var(--card-border);
        background: transparent;
        border-radius: 0.5rem;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <load src="../../ui/navbar.html" />

    <h1>QR Code Generator</h1>

    <div class="blur-tool-layout">
      <div class="blur-sidebar">
        <div class="sidebar-section">
          <h3>1. Content</h3>
          <div class="search-input-wrapper" style="margin: 0; max-width: none">
            <input
              type="text"
              id="qr-text"
              placeholder="Enter URL or text..."
              autocomplete="off"
              style="padding-left: 1rem"
            />
          </div>
        </div>

        <div class="sidebar-section">
          <h3>2. Appearance</h3>
          <div class="color-picker-group">
            <div class="color-input-wrapper">
              <label>Foreground</label>
              <input type="color" id="qr-color-dark" value="#000000" />
            </div>
            <div class="color-input-wrapper">
              <label>Background</label>
              <input type="color" id="qr-color-light" value="#ffffff" />
            </div>
          </div>

          <div class="sidebar-section">
            <label
              style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem"
              >Size</label
            >
            <input
              type="range"
              id="qr-size"
              min="128"
              max="512"
              step="32"
              value="256"
              style="width: 100%"
            />
            <div
              style="
                display: flex;
                justify-content: space-between;
                font-size: 0.75rem;
                color: #64748b;
                margin-top: 0.5rem;
              "
            >
              <span>Small</span>
              <span id="size-value">256px</span>
              <span>Large</span>
            </div>
          </div>
        </div>

        <button id="download-qr" class="btn btn-primary download-btn" disabled>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download PNG
        </button>
      </div>

      <div class="blur-main">
        <div id="qr-container" class="qr-preview-container empty">
          <div id="qrcode"></div>
          <div id="qr-placeholder">Your QR code will appear here</div>
        </div>
      </div>
    </div>

    <load src="../../ui/footer.html" />

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script type="module" src="./qr-gen.js"></script>
    <script type="module" src="/ui/navbar.js"></script>
  </body>
</html>
