<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator (TBXM)</title>
  <link rel="icon" href="../../.assets/logo/fav.png" />
  <link rel="stylesheet" href="../../style.css">
  <style>
    .password-display-container {
      background: #0f172a;
      border: 1px solid var(--card-border);
      border-radius: 1rem;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
    }

    #password-output {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 2rem;
      color: var(--primary-color);
      word-break: break-all;
      text-align: center;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .strength-meter {
      width: 100%;
      height: 8px;
      background: #1e293b;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
    }

    .strength-text {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-top: 0.5rem;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .checkbox-item input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      cursor: pointer;
      accent-color: var(--primary-color);
    }

    .copy-feedback {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary-color);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 1000;
    }

    .copy-feedback.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <a href="/" class="back-link">← Back</a>
  <h1>Password Generator</h1>

  <div class="blur-tool-layout">
    <div class="blur-sidebar">
      <div class="sidebar-section">
        <h3>1. Password Length</h3>
        <div class="slider-group">
          <div class="slider-header">
            <span>Length</span>
            <span class="val-badge"><span id="length-val">16</span></span>
          </div>
          <input type="range" id="password-length" min="4" max="50" value="16">
        </div>
      </div>

      <div class="sidebar-section">
        <h3>2. Character Types</h3>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="include-uppercase" checked>
            <span>Include Uppercase (A-Z)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="include-lowercase" checked>
            <span>Include Lowercase (a-z)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="include-numbers" checked>
            <span>Include Numbers (0-9)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="include-symbols" checked>
            <span>Include Symbols (!@#$%^&*)</span>
          </label>
        </div>
      </div>

      <div class="sidebar-section" style="margin-top: auto;">
        <button class="btn btn-primary w-full" id="generate-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            <polyline points="22 4 12 14.5 8.5 11"></polyline>
          </svg>
          Generate Password
        </button>
      </div>
    </div>

    <div class="blur-main">
      <div class="password-display-container">
        <div id="password-output">Click Generate</div>
        
        <div style="width: 100%;">
          <div class="strength-meter">
            <div id="strength-bar" class="strength-bar"></div>
          </div>
          <div id="strength-text" class="strength-text">Strength: -</div>
        </div>

        <button class="btn btn-primary w-full" id="copy-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
          </svg>
          Copy to Clipboard
        </button>
      </div>
    </div>
  </div>

  <div id="copy-feedback" class="copy-feedback">Password copied!</div>

  <script type="module" src="./password-gen.js"></script>
</body>

</html>
