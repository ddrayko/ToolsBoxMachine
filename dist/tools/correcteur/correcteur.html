    <h1>Text Corrector</h1>

    <div class="blur-tool-layout">
      <div class="blur-sidebar">
        <div class="sidebar-section">
          <h3>1. Language</h3>
          <div class="custom-radio-group mode-selector">
            <label class="radio-card">
              <input type="radio" name="langMode" value="fr" checked />
              <div class="radio-content">🇫🇷 French</div>
            </label>
            <label class="radio-card">
              <input type="radio" name="langMode" value="en-US" />
              <div class="radio-content">🇬🇧 English</div>
            </label>
          </div>
        </div>

        <div
          class="sidebar-section"
          style="
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
          "
        >
          <button class="btn btn-primary w-full check-btn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
              <polyline points="22 4 12 14.5 8.5 11"></polyline>
            </svg>
            Check Text
          </button>

          <button class="btn w-full clear-btn" style="background: #334155">
            Clear All
          </button>
        </div>
      </div>

      <div class="blur-main">
        <div class="simple-corrector">
          <div id="input-view" class="view-container">
            <textarea
              id="text-input"
              placeholder="Type or paste your text here..."
              spellcheck="false"
            ></textarea>
            <div class="actions-bar">
              <button class="btn btn-primary check-btn">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                  <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                Check & Auto-Correct
              </button>
              <button class="btn btn-secondary clear-btn">Clear</button>
            </div>
          </div>

          <div id="result-view" class="view-container" style="display: none">
            <div id="corrected-text" class="corrected-text-area"></div>
            <div class="actions-bar">
              <button class="btn btn-secondary" id="edit-btn">
                Back to Edit
              </button>
              <button class="btn btn-primary" id="copy-btn">
                Copy Corrected Text
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Floating Menu for alternatives -->
      <div id="alternatives-menu" class="alternatives-menu"></div>
    </div>

    <div id="copy-feedback" class="copy-feedback">Text copied!</div>
